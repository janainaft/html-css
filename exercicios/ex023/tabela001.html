<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        tr.linha{
            background-color: rgb(179, 179, 241);
        }

        table{
            width: 400px;
            border-collapse: collapse;
            border: 5px solid darkgreen;
        }

        td{
            border: 1px solid black;
        }

        td.dado{
            background-color: aqua;
        }
    </style>
    <title>Tabelas</title>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!--
       Hierarquia de tabelas (simples)
       Table = tabela;
       Table Rows = linha da tabela (linhas dentro das tabelas);
          Table Header = cabeçalho da tabela;
          Table Data = dado de tabela;
    -->
    <table>
        <tr> <!--Primeira linha-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="linha"> <!--Segundo linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr> <!--Terceira linha-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr> <!--Quarta linha-->
            <td>A4</td>
            <td class="dado">B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>

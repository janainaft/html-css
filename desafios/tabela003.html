<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
        }

        th , td{
            border: 1px solid black;
            padding: 10px;
        }
    </style>
    <title>Resultados</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="rowgroup">Área</th>
                <th rowspan="2" scope="rowgroup">Disciplina</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="rowgroup">Média</th>
            </tr>

                 <tr>
                      <th rowspan="2" scope="row">Nota 1</th>
                      <th rowspan="2" scope="row">Nota 2</th>
                 </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                 <td>Matemática</td>
                 <td>25</td>
                 <td>30</td>
                 <td>65</td>
            </tr>

            <tr>
                <td>Física</td>
                <td>15</td>
                <td>20</td>
                <td>35</td>
            </tr>

            <tr>
                <td>Química</td>
                <td>20</td>
                <td>30</td>
                <td>60</td>
            </tr>

            <tr>
                <td>Biologia</td>
                <td>30</td>
                <td>40</td>
                <td>70</td>
            </tr>

            <tr>
                <th rowspan="4" scope="rowgroup" >Média de Exatas</th>
                <td>2.3</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
